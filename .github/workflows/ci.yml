name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & Test (Swift, macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build -v

      - name: Test with coverage
        run: swift test --enable-code-coverage

      - name: Export coverage (lcov)
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name default.profdata | head -1)
          XCTEST_BINARY=$(find "$BIN_PATH" -name '*.xctest' -maxdepth 1 | head -1)
          xcrun llvm-cov export \
            "$XCTEST_BINARY/Contents/MacOS/$(basename "$XCTEST_BINARY" .xctest)" \
            -instr-profile "$PROFDATA" \
            -format lcov \
            -ignore-filename-regex '(\.build|Tests)/' \
            > coverage.lcov

      - name: Coverage summary
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA=$(find .build -name default.profdata | head -1)
          XCTEST_BINARY=$(find "$BIN_PATH" -name '*.xctest' -maxdepth 1 | head -1)
          {
            echo '## Coverage'
            echo '```'
            xcrun llvm-cov report \
              "$XCTEST_BINARY/Contents/MacOS/$(basename "$XCTEST_BINARY" .xctest)" \
              -instr-profile "$PROFDATA" \
              -ignore-filename-regex '(\.build|Tests)/'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov

      - name: Smoke-test CLI on sample fixture
        run: |
          swift run svg2og Resources/load-balancer.svg -o /tmp/out.svg
          xmllint --noout /tmp/out.svg
          test "$(xmllint --xpath 'count(//*[local-name()="foreignObject"])' /tmp/out.svg)" = "0"
          test "$(xmllint --xpath 'count(//*[local-name()="text"])' /tmp/out.svg)" = "25"
